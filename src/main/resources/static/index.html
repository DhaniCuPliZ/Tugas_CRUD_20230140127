<!DOCTYPE html>
<html lang="id">
<head>

    <meta charset="UTF-8">
    <title>Sistem Data KTP</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="script.js"></script>

</head>

<body>

<div class="container">

    <h1>📄 Sistem Data KTP</h1>

    <div class="card">

        <h2>Tambah / Edit Data</h2>

        <form id="ktpForm">

            <input type="hidden" id="id">

            <div class="form-group">
                <label>Nomor KTP</label>
                <input type="text" id="nomorKtp" required>
            </div>

            <div class="form-group">
                <label>Nama Lengkap</label>
                <input type="text" id="namaLengkap" required>
            </div>

            <div class="form-group">
                <label>Alamat</label>
                <input type="text" id="alamat" required>
            </div>

            <div class="form-group">
                <label>Tanggal Lahir</label>
                <input type="date" id="tanggalLahir" required>
            </div>

            <div class="form-group">
                <label>Jenis Kelamin</label>
                <select id="jenisKelamin">
                    <option value="Laki-laki">Laki-laki</option>
                    <option value="Perempuan">Perempuan</option>
                </select>
            </div>

            <div class="button-group">
                <button type="submit" class="btn-primary">Simpan</button>
                <button type="button" class="btn-cancel" onclick="resetForm()">Batal</button>
            </div>

        </form>

    </div>


    <div class="card">

        <h2>📋 Daftar Data KTP</h2>

        <table>

            <thead>
            <tr>
                <th>ID</th>
                <th>Nomor KTP</th>
                <th>Nama</th>
                <th>Alamat</th>
                <th>Tanggal Lahir</th>
                <th>Jenis Kelamin</th>
                <th>Aksi</th>
            </tr>
            </thead>

            <tbody id="dataTable"></tbody>

        </table>

    </div>

</div>

</body>
</html>
